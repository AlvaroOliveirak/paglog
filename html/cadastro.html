<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Cadastro</title>
    <link rel="stylesheet" href="../css/style.css">
    
</head>
<body>

    <div id="side">
        <h1>Enterpise-X</h1>
    </div>

    <main>
        <h1>Sign up</h1>
        <h1 id="sign" style="color: rgba(124, 107, 107, 0.897);">Register</h1>
        <div id="formulario">
            <h3 style="color: rgb(151, 0, 0);" class="cred">Your email</h3>
            <input type="email" placeholder="Your email here" id="email"  size="40px">
            <h3 style="color: rgb(163, 4, 4);" class="cred">Your password</h3>
            <input type="password" placeholder="Your password here" id="password" size="40px" > <br>

            <button id="log" onclick="cadastrar()">Register</button> <br>
             <p id="or">or</p>

            <button id="log2" onclick="cadastrarG()">Register with Google</button><br>
        </div>
    </main>
    
    <script src="../js/scriptcad.js"></script>
</body>
</html>
